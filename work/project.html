<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PORTFOLIO PROJECT</title>

    <link rel="stylesheet" href="../css/project.css">
</head>

<body>

    <header id="header">

        <h1 class="logo">
            <a href="../index.html">YOON SEOK HEE</a>
        </h1>

        <a href="../index.html#work" class="back-link">
            BACK TO WORK
        </a>

    </header>

    <main id="project">

        <section class="project-visual">

            <div class="page-objects">

                <span class="p-blur p-blur01"></span>
                <span class="p-blur p-blur02"></span>

                <span class="p-circle p-circle01"></span>
                <span class="p-circle p-circle02"></span>
                <span class="p-circle p-circle03"></span>

                <span class="p-dot p-dot01"></span>
                <span class="p-dot p-dot02"></span>
                <span class="p-dot p-dot03"></span>
                <span class="p-dot p-dot04"></span>

                <span class="p-star p-star01"></span>
                <span class="p-star p-star02"></span>

            </div>

            <div class="inner">

                <div class="project-title">

                    <span id="projectNumber">
                        PROJECT
                    </span>

                    <h1 id="projectTitle">
                        WEB DESIGN<br>
                        PROJECT
                    </h1>

                </div>

                <div class="project-info" id="projectInfo">

                    <dl>
                        <dt>TYPE</dt>
                        <dd id="projectType">-</dd>
                    </dl>

                    <dl id="projectLinkBox">

                        <dt>LINK</dt>

                        <dd>
                            <a
                                id="projectLink"
                                href="#"
                                target="_blank"
                                rel="noopener noreferrer"
                            >
                                -
                            </a>
                        </dd>

                    </dl>

                    <dl>
                        <dt>TOOL</dt>
                        <dd id="projectTools">-</dd>
                    </dl>

                </div>

            </div>

        </section>

        <section class="project-section">

            <div class="inner">

                <div class="project-thumb">

                    <img
                        id="projectImage"
                        src=""
                        alt=""
                    >

                </div>

                <div class="project-desc">

                    <h2 id="overviewTitle">
                        OVERVIEW
                    </h2>

                    <p id="overviewText"></p>

                </div>

            </div>

        </section>

        <section class="project-section">

            <div class="inner">

                <div class="project-desc2">

                    <h2 id="workPointTitle">
                        WORK POINT
                    </h2>

                    <p id="workPointText"></p>

                </div>

            </div>

        </section>

        <section
            id="projectError"
            class="project-section"
            hidden
        >

            <div class="inner">

                <div class="project-desc2">

                    <h2>PROJECT NOT FOUND</h2>

                    <p>
                        프로젝트 정보를 불러오지 못했습니다.
                    </p>

                </div>

            </div>

        </section>

    </main>

    <script src="../js/project.js"></script>

</body>

</html>
