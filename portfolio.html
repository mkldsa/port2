<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ALL PROJECTS | YOON SEOK HEE</title>

    <link rel="icon" type="images/png" href="./favicon.png">
    <link rel="stylesheet" href="./css/portfolio.css">
</head>

<body id="top">

    <header class="projects-header">
        <a href="./index.html" class="projects-logo">
            YOON SEOK HEE
        </a>

        <a href="./index.html#work" class="projects-back">
            <span>BACK TO HOME</span>
            <i aria-hidden="true">×</i>
        </a>
    </header>

    <main>

        <section class="projects-hero">

            <div class="projects-objects" aria-hidden="true">
                <span class="project-object object-cross object-cross-01"></span>
                <span class="project-object object-cross object-cross-02"></span>
                <span class="project-object object-circle object-circle-01"></span>
                <span class="project-object object-circle object-circle-02"></span>
                <span class="project-object object-dot object-dot-01"></span>
                <span class="project-object object-dot object-dot-02"></span>
            </div>

            <div class="projects-inner">

                <span class="projects-label">
                    WORK
                </span>

                <div class="projects-hero-row">

                    <h1>
                        ALL<br>
                        PROJECTS
                    </h1>

                    <div class="projects-summary">
                        <p>
                            다양한 브랜드의 웹사이트를 기획하고,<br>
                            디자인과 퍼블리싱을 통해 구현했습니다.
                        </p>

                        <span class="projects-count">
                            <b id="projectCount">00</b>
                            PROJECTS
                        </span>
                    </div>

                </div>

            </div>

        </section>

        <section class="projects-content">

            <div class="projects-inner">

                <div class="projects-toolbar">

                    <div class="project-filter" aria-label="프로젝트 분류">

                        <button type="button" class="active" data-filter="all">
                            ALL
                        </button>

                        <button type="button" data-filter="cafe24">
                            CAFE24
                        </button>

                        <button type="button" data-filter="wordpress">
                            WORDPRESS
                        </button>

                        <button type="button" data-filter="landing">
                            LANDING
                        </button>

                        <button type="button" data-filter="detail">
                            DETAIL PAGE
                        </button>

                        <button type="button" data-filter="promotion">
                            PROMOTION
                        </button>

                    </div>

                    <p class="projects-result">
                        SHOWING
                        <b id="visibleProjectCount">00</b>
                    </p>

                </div>

                <div class="projects-grid" id="projectsGrid"></div>

                <div class="projects-empty" id="projectsEmpty" hidden>
                    해당 카테고리의 프로젝트가 없습니다.
                </div>

            </div>

        </section>

        <section class="projects-contact">

            <div class="projects-inner">

                <span class="projects-label">
                    CONTACT
                </span>

                <div class="projects-contact-row">

                    <h2>
                        LET’S WORK<br>
                        TOGETHER
                    </h2>

                    <a href="./index.html#contact" class="contact-button">
                        CONTACT ME
                        <i aria-hidden="true">→</i>
                    </a>

                </div>

            </div>

        </section>

    </main>

    <footer class="projects-footer">

        <div class="projects-inner">

            <p>
                © 2026 YOON SEOK HEE
            </p>

            <a href="#top">
                BACK TO TOP
                <span aria-hidden="true">↑</span>
            </a>

        </div>

    </footer>

    <script src="./js/portfolio.js"></script>
</body>

</html>
